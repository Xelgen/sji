<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Social Justice Innovation NGO</title>
  <meta name="description" content="Social Justice Innovation NGO">
  <meta name="robots" content="index,follow">
  <style>
    :root {
      --text: #111111;
      --muted: #444444;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .logo {
      width: min(340px, 72vw);
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 auto 16px;
      max-width: 680px;
      font-size: clamp(1rem, 2vw, 1.1rem);
      color: var(--muted);
    }

    .contact {
      margin-top: 8px;
      font-size: clamp(1rem, 2vw, 1.1rem);
      color: var(--text);
    }

    .contact div {
      margin: 8px 0;
    }

    a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.15em;
    }

    a:hover {
      text-decoration-thickness: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
